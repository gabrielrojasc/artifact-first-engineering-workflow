<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__AF_TITLE__</title>
<link id="hl-dark" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer"
  href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github-dark.min.css">
<link id="hl-light" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer" disabled
  href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github.min.css">
<style>
:root {
  --radius:6px;
  --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,sans-serif;
  --font-head:var(--font-body);
  --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
:root[data-theme="dark"] {
  color-scheme:dark;
  --bg:#08090a; --bg-elev:#17181b; --bg-inset:#0e0f11;
  --fg:#d0d3d9; --fg-strong:#f7f8f8; --fg-muted:#8a8f98;
  --border:#222326; --accent:#7170ff; --accent-2:#9a9aff; --link:#7170ff;
  --ok-bg:#11241b; --ok-fg:#4cc38a; --warn-bg:#241f12; --warn-fg:#e2b340;
  --err-bg:#241316; --err-fg:#f7616e; --idle-bg:#16171a; --idle-fg:#8a8f98;
}
:root[data-theme="light"] {
  color-scheme:light;
  --bg:#ffffff; --bg-elev:#f7f8f9; --bg-inset:#f1f2f4;
  --fg:#3a3d44; --fg-strong:#08090a; --fg-muted:#6b6f76;
  --border:#e6e7eb; --accent:#5e6ad2; --accent-2:#5e6ad2; --link:#5e6ad2;
  --ok-bg:#e7f7ee; --ok-fg:#177d52; --warn-bg:#fdf4e3; --warn-fg:#9a6a00;
  --err-bg:#fdeaec; --err-fg:#c4313d; --idle-bg:#f1f2f4; --idle-fg:#6b6f76;
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--font-body);
  font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
.layout { display:grid; grid-template-columns:256px minmax(0,1fr); max-width:1180px; margin:0 auto; }
.sidebar { position:sticky; top:0; align-self:start; height:100vh; padding:26px 18px;
  border-right:1px solid var(--border); background:var(--bg); overflow:auto; }
.side-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.kind { font-family:var(--font-head); font-size:12px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--fg-muted); font-weight:700; }
.toggle { background:var(--bg-elev); color:var(--fg); border:1px solid var(--border); border-radius:8px;
  width:30px; height:30px; cursor:pointer; font-size:15px; line-height:1; }
.toggle:hover { border-color:var(--accent); color:var(--accent); }
.toc { display:flex; flex-direction:column; gap:2px; }
.toc a { color:var(--fg-muted); text-decoration:none; font-size:14px; padding:6px 10px;
  border-radius:7px; border-left:2px solid transparent; transition:color .12s, background .12s; }
.toc a.lvl3 { padding-left:22px; font-size:13px; }
.toc a:hover { color:var(--fg-strong); background:var(--bg-elev); }
.toc a.active { color:var(--accent); border-left-color:var(--accent); background:var(--bg-elev); }
.content { padding:42px 48px 80px; min-width:0; }
.crumbs { font-family:var(--font-mono); font-size:12.5px; color:var(--fg-muted); margin-bottom:12px; word-break:break-all; }
.doc-head { margin-bottom:8px; padding-bottom:18px; border-bottom:1px solid var(--border); }
.meta { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.meta-item { font-size:12.5px; color:var(--fg-muted); font-family:var(--font-mono); }
article { min-width:0; }
h1 { font-family:var(--font-head); font-size:30px; line-height:1.25; margin:.4em 0 .5em;
  color:var(--fg-strong); letter-spacing:-.01em; padding-bottom:.3em; border-bottom:1px solid var(--border); }
h2 { font-family:var(--font-head); font-size:21px; margin:1.6em 0 .6em; color:var(--fg-strong);
  scroll-margin-top:24px; padding-bottom:.3em; border-bottom:1px solid var(--border); }
h3 { font-size:16.5px; color:var(--fg-strong); margin:1.5em 0 .5em; scroll-margin-top:24px; }
h4 { font-size:12.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--fg-muted); margin:1.5em 0 .5em; }
p { margin:0 0 1em; }
a { color:var(--link); text-decoration:none; } a:hover { text-decoration:underline; }
ul, ol { margin:0 0 1em; padding-left:1.4em; } li { margin:.32em 0; }
strong { color:var(--fg-strong); font-weight:650; }
hr { border:none; border-top:1px solid var(--border); margin:2em 0; }
code { font-family:var(--font-mono); font-size:.86em; background:var(--bg-inset);
  border:1px solid var(--border); border-radius:5px; padding:.1em .42em; color:var(--fg-strong); }
pre { background:var(--bg-inset); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; overflow:auto; margin:0 0 1em; }
pre code { background:none; border:none; padding:0; color:var(--fg); font-size:13.5px; line-height:1.65; }
.hljs { background:transparent !important; padding:0 !important; }
blockquote { margin:0 0 1em; padding:12px 16px; border-left:3px solid var(--accent);
  background:var(--bg-elev); border-radius:0 var(--radius) var(--radius) 0; }
blockquote > :last-child { margin-bottom:0; }
table { width:100%; border-collapse:collapse; margin:0 0 1em; font-size:14.5px; display:block; overflow-x:auto; }
th, td { text-align:left; padding:10px 12px; border:1px solid var(--border); }
thead th { background:var(--bg-inset); color:var(--fg-muted); font-size:11.5px;
  text-transform:uppercase; letter-spacing:.06em; }
tbody tr:hover { background:var(--bg-elev); }
.mermaid { margin:0 0 1em; padding:20px; background:var(--bg-elev); border:1px solid var(--border);
  border-radius:var(--radius); text-align:center; overflow:auto; }
.mermaid svg { max-width:100%; height:auto; }
.pill { display:inline-block; font-family:var(--font-head); font-size:11px; font-weight:700;
  letter-spacing:.04em; padding:3px 10px; border-radius:2em; text-transform:uppercase; white-space:nowrap; }
.pill.ok{ background:var(--ok-bg); color:var(--ok-fg); }
.pill.warn{ background:var(--warn-bg); color:var(--warn-fg); }
.pill.err{ background:var(--err-bg); color:var(--err-fg); }
.pill.idle{ background:var(--idle-bg); color:var(--idle-fg); }
.kind-pill{ background:var(--accent); color:#fff; border-radius:2em; }
.task-list-item { list-style:none; }
.task-list-item input { margin:0 .5em 0 -1.1em; accent-color:var(--accent); }
.doc-foot { margin-top:52px; padding-top:18px; border-top:1px solid var(--border);
  font-size:12.5px; color:var(--fg-muted); font-family:var(--font-mono); word-break:break-all; }
@media (max-width:860px){
  .layout{ grid-template-columns:1fr; }
  .sidebar{ position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); }
  .content{ padding:28px 20px 60px; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="side-head">
      <span class="kind">__AF_KIND__</span>
      <button id="themeToggle" class="toggle" type="button" aria-label="Toggle light/dark" title="Toggle light/dark">◐</button>
    </div>
    <nav class="toc" id="toc" aria-label="Contents"></nav>
  </aside>
  <main class="content">
    <header class="doc-head">
      <div class="crumbs">__AF_CRUMBS__</div>
      <div class="meta">
        <span class="pill kind-pill">__AF_KIND__</span>
        <span class="meta-item">__AF_DATE__</span>
      </div>
    </header>
    <article id="doc"></article>
    <footer class="doc-foot">Source of truth: <code>__AF_SOURCE__</code> · rendered view</footer>
  </main>
</div>

<script id="src" type="application/base64">__AF_B64__</script>
<script crossorigin="anonymous" referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script crossorigin="anonymous" referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script crossorigin="anonymous" referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
<script>
(function () {
  var root = document.documentElement;
  try { var s = localStorage.getItem("af-theme"); if (s) root.setAttribute("data-theme", s); } catch (e) {}

  // Decode the embedded Markdown (base64 -> UTF-8).
  var raw = "";
  try {
    var b64 = (document.getElementById("src").textContent || "").replace(/\s+/g, "");
    var bin = atob(b64);
    var bytes = Uint8Array.from(bin, function (c) { return c.charCodeAt(0); });
    raw = new TextDecoder("utf-8").decode(bytes);
  } catch (e) { raw = ""; }

  var docEl = document.getElementById("doc");
  if (typeof marked === "undefined") {
    var pre = document.createElement("pre");
    pre.textContent = raw || "Renderer assets failed to load (offline?). The Markdown source is the source of truth.";
    docEl.appendChild(pre);
  } else {
    marked.setOptions({ gfm: true, breaks: false });
    docEl.innerHTML = marked.parse(raw);
  }

  // Promote ```mermaid fenced blocks to <div class="mermaid">.
  var mmNodes = [];
  docEl.querySelectorAll("code.language-mermaid").forEach(function (code) {
    var host = code.closest("pre") || code;
    var div = document.createElement("div");
    div.className = "mermaid";
    div.setAttribute("data-src", code.textContent);
    div.textContent = code.textContent;
    host.replaceWith(div);
    mmNodes.push(div);
  });
  function renderMermaid() {
    if (typeof mermaid === "undefined" || !mmNodes.length) return;
    var dark = root.getAttribute("data-theme") !== "light";
    mmNodes.forEach(function (d) {
      d.removeAttribute("data-processed");
      d.innerHTML = "";
      d.textContent = d.getAttribute("data-src");
    });
    try {
      mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: dark ? "dark" : "default" });
      mermaid.run({ nodes: mmNodes });
    } catch (e) {}
  }
  renderMermaid();

  // Syntax-highlight remaining code blocks.
  if (typeof hljs !== "undefined") {
    docEl.querySelectorAll("pre code").forEach(function (c) {
      if (!c.classList.contains("language-mermaid")) { try { hljs.highlightElement(c); } catch (e) {} }
    });
  }

  // Auto-color status words in the last table column.
  var map = [
    [/^(done|complete|completed|shipped|passed|ready|merged|approved)$/i, "ok"],
    [/^(in progress|wip|active|in review|ongoing)$/i, "warn"],
    [/^(blocked|failed|at risk|not ready|rejected)$/i, "err"],
    [/^(not started|todo|to do|pending|queued|planned|deferred)$/i, "idle"]
  ];
  docEl.querySelectorAll("table tbody tr td:last-child").forEach(function (td) {
    var t = td.textContent.trim();
    for (var i = 0; i < map.length; i++) {
      if (map[i][0].test(t)) { td.innerHTML = '<span class="pill ' + map[i][1] + '">' + t + "</span>"; break; }
    }
  });

  // Build the table of contents from h2/h3.
  var toc = document.getElementById("toc");
  var heads = docEl.querySelectorAll("h2, h3");
  var used = {};
  function slug(t) {
    var s = t.toLowerCase().replace(/[^\w\s-]/g, "").trim().replace(/\s+/g, "-") || "section";
    var base = s, n = 2; while (used[s]) { s = base + "-" + n++; } used[s] = 1; return s;
  }
  heads.forEach(function (h) {
    if (!h.id) h.id = slug(h.textContent);
    var a = document.createElement("a");
    a.href = "#" + h.id; a.textContent = h.textContent;
    if (h.tagName === "H3") a.className = "lvl3";
    toc.appendChild(a);
  });

  // Scrollspy.
  var links = {};
  toc.querySelectorAll("a").forEach(function (a) { links[a.getAttribute("href").slice(1)] = a; });
  if ("IntersectionObserver" in window) {
    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        var a = links[en.target.id];
        if (a && en.isIntersecting) {
          Object.keys(links).forEach(function (k) { links[k].classList.remove("active"); });
          a.classList.add("active");
        }
      });
    }, { rootMargin: "0px 0px -75% 0px" });
    heads.forEach(function (h) { obs.observe(h); });
  }

  // Theme toggle (swap hljs theme + re-render mermaid for legibility).
  var hlDark = document.getElementById("hl-dark"), hlLight = document.getElementById("hl-light");
  function applyHljs() {
    var dark = root.getAttribute("data-theme") !== "light";
    if (hlDark) hlDark.disabled = !dark;
    if (hlLight) hlLight.disabled = dark;
  }
  applyHljs();
  var btn = document.getElementById("themeToggle");
  if (btn) btn.addEventListener("click", function () {
    var next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("af-theme", next); } catch (e) {}
    applyHljs();
    renderMermaid();
  });
})();
</script>
</body>
</html>
